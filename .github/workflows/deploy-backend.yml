name: Deploy backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-1
  ECR_REPO: evh/api

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC, for ECR only)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::487054650567:role/evh-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.run_number }}-${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPO:latest \
            ./backend
          docker push $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPO:latest

      - name: Diagnose SSH secret
        env:
          KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          HOST: ${{ secrets.EC2_HOST }}
          USER: ${{ secrets.EC2_USER }}
        run: |
          echo "EC2_HOST set: $([ -n "$HOST" ] && echo yes || echo NO)"
          echo "EC2_USER set: $([ -n "$USER" ] && echo yes || echo NO)"
          echo "EC2_SSH_PRIVATE_KEY length (chars): ${#KEY}"
          echo "EC2_SSH_PRIVATE_KEY line count: $(echo "$KEY" | wc -l)"
          echo "First line: $(echo "$KEY" | head -1)"
          echo "Last line:  $(echo "$KEY" | tail -1)"
          # Write to file and inspect format
          mkdir -p ~/.ssh
          echo "$KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "Key file:"
          ls -la ~/.ssh/deploy_key
          file ~/.ssh/deploy_key
          # Try a verbose SSH connection to see what the server says
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o BatchMode=yes -v \
            "$USER@$HOST" 'echo SSH_OK' 2>&1 | tail -30 || true

      - name: Deploy on EC2 via SSH (plain ssh)
        env:
          KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          HOST: ${{ secrets.EC2_HOST }}
          USER: ${{ secrets.EC2_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$USER@$HOST" bash -s <<'REMOTE'
            set -e
            source /etc/profile.d/evhacks.sh
            cd /opt/evhacks/app
            aws ecr get-login-password --region "$AWS_REGION" \
              | docker login --username AWS --password-stdin "$ECR_REGISTRY"
            docker compose pull api
            docker compose up -d --no-deps --force-recreate api
            docker compose ps
          REMOTE

      - name: Health check
        env:
          HOST: ${{ secrets.EC2_HOST }}
          USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$USER@$HOST" bash -s <<'REMOTE'
            for i in $(seq 1 30); do
              STATUS=$(docker inspect --format '{{.State.Status}}' evhacks-api 2>/dev/null || echo "missing")
              echo "[$i] container status: $STATUS"
              if [ "$STATUS" = "running" ]; then
                if curl -fs -m 3 http://localhost:8000/admin/ >/dev/null 2>&1 || curl -s -m 3 http://localhost:8000/ >/dev/null 2>&1; then
                  echo "Healthy"
                  exit 0
                fi
              fi
              sleep 2
            done
            echo "::error::API didn't respond within 60s"
            cd /opt/evhacks/app && docker compose logs api --tail 100
            exit 1
          REMOTE
