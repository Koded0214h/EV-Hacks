services:
  # Local-dev Postgres. Disabled in production via profile — uses RDS instead.
  db:
    profiles: ["local"]
    image: postgis/postgis:15-3.3
    container_name: evhacks-db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: evhacks-redis
    ports:
      - "6379:6379"

  api:
    # Local dev:  builds from ./Dockerfile (ECR_REGISTRY empty → falls back to "evh/api")
    # Production: pulls ${ECR_REGISTRY}/evh/api:${IMAGE_TAG}
    image: ${ECR_REGISTRY:-localhost}/evh/api:${IMAGE_TAG:-latest}
    build: .
    container_name: evhacks-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis

volumes:
  postgres_data:
